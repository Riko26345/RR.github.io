<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Scarlett RP — Loading Screen</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="hearts" id="hearts" aria-hidden="true"></div>
  <div class="sparkles" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <main class="screen">
    <section class="paper-board" aria-label="Экран подключения Scarlett RP">
      <div class="holes" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>

      <aside class="note note-left" aria-hidden="true">
        <div class="tape"></div>
        <div class="note-lines"></div>
      </aside>

      <aside class="note note-right" aria-hidden="true">
        <div class="rings">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="note-lines"></div>
      </aside>

      <div class="corner-fold" aria-hidden="true"></div>
      <div class="sticker sticker-1" aria-hidden="true">♥</div>
      <div class="sticker sticker-2" aria-hidden="true">♥</div>
      <div class="sticker sticker-3" aria-hidden="true">♥</div>

      <div class="content">
        <div class="intro">
          <p class="eyebrow">Добро пожаловать</p>
          <h1 class="title">Scarlett RP</h1>
          <p class="subtitle">Подключение<span class="dots"><span>.</span><span>.</span><span>.</span></span></p>
        </div>

        <div class="board-panels">
          <nav class="main-menu" aria-labelledby="main-menu-title">
            <span class="menu-pin menu-pin-left" aria-hidden="true"></span>
            <span class="menu-pin menu-pin-right" aria-hidden="true"></span>
            <h2 id="main-menu-title">Правила сервера</h2>
            <ul class="main-menu-list">
              <li>
                <span class="menu-label">Быть крутым</span>
                <span class="menu-index">01</span>
              </li>
              <li>
                <span class="menu-label">Быть добрым</span>
                <span class="menu-index">02</span>
              </li>
              <li>
                <span class="menu-label">Быть милым</span>
                <span class="menu-index">03</span>
              </li>
              <li>
                <span class="menu-label">Быть адекватным</span>
                <span class="menu-index">04</span>
              </li>
            </ul>
          </nav>

          <section class="staff-card" aria-labelledby="staff-title">
            <div class="pin" aria-hidden="true"></div>
            <h2 id="staff-title">Staff</h2>
            <ul class="staff-list">
              <li>
                <span class="staff-name">Andrey Reinz</span>
                <span class="staff-role">Developer</span>
              </li>
            </ul>
          </section>
        </div>

        <div class="footer-note">
          <span class="footer-line"></span>
          <p>Спасибо, что заходишь на Scarlett RP</p>
          <span class="footer-line"></span>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
